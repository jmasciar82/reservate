services:
  - type: web
    name: reservate-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build -w backend
    startCommand: node apps/backend/dist/main.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false

